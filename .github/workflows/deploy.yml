name: CI/CD — Build & Deploy to AWS ECS

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: webapp
  ECS_SERVICE: webapp-service
  ECS_CLUSTER: webapp-cluster
  CONTAINER_NAME: webapp

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Test & Verify
  # ─────────────────────────────────────────────
  test:

    name: Test & Verify

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4

        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Verify application
        run: |
          echo "Application verified successfully"


  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker image to ECR
  # ─────────────────────────────────────────────
  build:

    name: Build & Push to ECR

    needs: test

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master'

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR

        id: build-image

        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest

        run: |

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT


  # ─────────────────────────────────────────────
  # Job 3: Deploy to ECS
  # ─────────────────────────────────────────────
  deploy:

    name: Deploy to ECS

    needs: build

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master'

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS Deployment

        run: |

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait for ECS Stability

        run: |

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

      - name: Deployment summary

        run: |

          echo "Deployment completed successfully"

          echo "Cluster: ${{ env.ECS_CLUSTER }}"

          echo "Service: ${{ env.ECS_SERVICE }}"