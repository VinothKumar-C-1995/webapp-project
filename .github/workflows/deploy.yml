name: CI/CD — Build & Deploy to AWS ECS

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: webapp
  ECS_SERVICE: webapp-service
  ECS_CLUSTER: webapp-cluster
  CONTAINER_NAME: webapp

jobs:

  # ─────────────────────────────────────────────
  # TEST JOB
  # ─────────────────────────────────────────────
  test:

    name: Test & Verify

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: |
          cd app
          npm install

      - name: Verify Application
        run: echo "Application verified successfully"


  # ─────────────────────────────────────────────
  # BUILD & PUSH TO ECR
  # ─────────────────────────────────────────────
  build:

    name: Build & Push to ECR

    needs: test

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master'

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: build-image

        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}

        run: |

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT


  # ─────────────────────────────────────────────
  # DEPLOY TO ECS
  # ─────────────────────────────────────────────
  deploy:

    name: Deploy to ECS

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Current ECS Task Definition
        run: |

          aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_CLUSTER }}-task \
          --query taskDefinition \
          > task-definition.json

      - name: Update ECS Task Definition
        id: task-def

        uses: aws-actions/amazon-ecs-render-task-definition@v1

        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to Amazon ECS

        uses: aws-actions/amazon-ecs-deploy-task-definition@v1

        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Success
        run: |

          echo "Deployment completed successfully"

          echo "✅ Image deployed:"
          echo "${{ needs.build.outputs.image }}"
          echo "🔗 Commit SHA: ${{ github.sha }}"